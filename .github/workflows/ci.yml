name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests and OpenAPI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        run: python -m pytest backend/tests

      - name: Generate OpenAPI artifact
        run: |
          mkdir -p artifacts
          SKYWEAVER_DATA_DIR="${RUNNER_TEMP}/skyweaver-data" \
          SKYWEAVER_CONFIG_DIR="${RUNNER_TEMP}/skyweaver-config" \
          SKYWEAVER_LOG_DIR="${RUNNER_TEMP}/skyweaver-logs" \
          SKYWEAVER_DB="${RUNNER_TEMP}/skyweaver-data/skyweaver.db" \
          PYTHONPATH=backend \
          python - <<'PY'
          import json
          from pathlib import Path

          from skyweaver.main import create_app

          Path("artifacts/openapi.json").write_text(
              json.dumps(create_app().openapi(), indent=2, sort_keys=True),
              encoding="utf-8",
          )
          PY

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-json
          path: artifacts/openapi.json

  frontend:
    name: Frontend lint, build, and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  shellcheck:
    name: Shellcheck scripts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck install.sh upgrade.sh uninstall.sh support.sh
